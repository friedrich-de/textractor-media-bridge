[server]
bind = "127.0.0.1:7788"
lan_mode = false
session_token_required = true

[pipe]
name = "auto"

[screenshot]
# auto tries Windows Graphics Capture first and falls back to Win32 GDI when needed.
backend = "auto"

[audio]
backend = "auto"
ready_preroll_ms = 1000
trailing_silence_ms = 3000
no_speech_timeout_ms = 5000
trim_source_preroll_ms = 1000
trim_trailing_silence_ms = 5000
trim_no_speech_timeout_ms = 8000
activity_threshold = 300
min_activity_ms = 30
trim_activity_threshold = 300
trim_min_activity_ms = 30
trim_padding_ms = 1000
max_duration_ms = 120000

[assets]
ttl_minutes = 120
max_storage_mb = 1024

[mining]
screenshot_quality = 85
audio_bitrate_kbps = 96
# ffmpeg_path = "C:\\path\\to\\ffmpeg.exe"

[anki]
range_sentence_separator = " "
range_screenshot_pick = "last"

[storage]
# data_dir = "C:\\Users\\you\\AppData\\Local\\TextractorMediaBridge"
