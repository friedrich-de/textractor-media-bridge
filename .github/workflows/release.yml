name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target: x86_64-pc-windows-msvc
          - arch: x86
            target: i686-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web_ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build web UI
        working-directory: web_ui
        run: |
          npm ci
          npm run format:check
          npm run lint
          npm run build

      - name: Build Rust release
        run: cargo build --release --target ${{ matrix.target }} -p textractor_bridge_server -p textractor_bridge_dll

      - name: Download FFmpeg
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          New-Item -ItemType Directory -Path vendor\ffmpeg -Force | Out-Null
          Invoke-WebRequest -Uri "https://www.gyan.dev/ffmpeg/builds/ffmpeg-release-essentials.zip" -OutFile vendor\ffmpeg\ffmpeg-release-essentials.zip
          Expand-Archive -LiteralPath vendor\ffmpeg\ffmpeg-release-essentials.zip -DestinationPath vendor\ffmpeg -Force
          $ffmpeg = Get-ChildItem vendor\ffmpeg -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          if (-not $ffmpeg) { throw "ffmpeg.exe was not found in downloaded archive" }
          Copy-Item -LiteralPath $ffmpeg.FullName -Destination vendor\ffmpeg\ffmpeg.exe -Force

      - name: Package release asset
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          if ("${{ startsWith(github.ref, 'refs/tags/') }}" -eq "true") {
            $version = "${{ github.ref_name }}"
          } else {
            $version = "manual-${{ github.run_number }}"
          }
          .\scripts\package-release.ps1 `
            -Target "${{ matrix.target }}" `
            -Arch "${{ matrix.arch }}" `
            -Version $version `
            -FfmpegPath "vendor\ffmpeg\ffmpeg.exe"

      - name: Upload build artifact
        if: startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: textractor-media-bridge-${{ matrix.arch }}
          path: dist/release/*.zip
          if-no-files-found: error

  release:
    name: Publish GitHub release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/*.zip
