name: Warm Rust Cache

on:
  push:
    branches:
      - "master"
    paths:
      - "Cargo.lock"
      - "Cargo.toml"
      - "crates/**/Cargo.toml"
      - ".cargo/**"
      - ".github/workflows/cache-warm.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  warm:
    name: Warm ${{ matrix.arch }}
    runs-on: windows-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target: x86_64-pc-windows-msvc
          - arch: x86
            target: i686-pc-windows-msvc

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web_ui/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}
          cache-targets: true

      - name: Build web UI
        working-directory: web_ui
        run: |
          npm ci
          npm run build

      - name: Build Rust release
        run: cargo build --release --target ${{ matrix.target }} -p textractor_bridge_server -p textractor_bridge_dll
